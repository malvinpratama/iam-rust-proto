syntax = "proto3";

package auth.v1;

// AuthService is the source of truth for identity, credentials, tokens and RBAC.
service AuthService {
  // Identity & tokens
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (TokenPair);
  rpc Refresh(RefreshRequest) returns (TokenPair);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  // ValidateToken is called by the gateway on every authenticated request.
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  // DeleteUser removes the identity entirely (credentials, roles, refresh tokens).
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);

  // RBAC management
  rpc CreateRole(CreateRoleRequest) returns (Role);
  rpc UpdateRole(UpdateRoleRequest) returns (Role);
  rpc DeleteRole(DeleteRoleRequest) returns (DeleteRoleResponse);
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse);
  rpc AssignRole(AssignRoleRequest) returns (AssignRoleResponse);
  rpc RevokeRole(RevokeRoleRequest) returns (RevokeRoleResponse);
  rpc ListPermissions(ListPermissionsRequest) returns (ListPermissionsResponse);
  rpc GrantPermission(GrantPermissionRequest) returns (GrantPermissionResponse);
  rpc RevokePermission(RevokePermissionRequest) returns (RevokePermissionResponse);

  // Account recovery & verification (v0.2)
  rpc RequestEmailVerification(EmailRequest) returns (DevTokenResponse);
  rpc VerifyEmail(TokenRequest) returns (GenericResponse);
  rpc RequestPasswordReset(EmailRequest) returns (DevTokenResponse);
  rpc ResetPassword(ResetPasswordRequest) returns (GenericResponse);

  // Audit log (v0.2)
  rpc ListAuditEvents(ListAuditEventsRequest) returns (ListAuditEventsResponse);

  // OIDC (v0.7): public signing keys (JWKS) for relying parties to verify tokens.
  rpc GetJwks(GetJwksRequest) returns (GetJwksResponse);
  // OIDC Authorization Code + PKCE flow.
  rpc GetClient(GetClientRequest) returns (OAuthClient);
  rpc CreateAuthorizationCode(CreateAuthorizationCodeRequest) returns (CreateAuthorizationCodeResponse);
  rpc GetConsent(GetConsentRequest) returns (GetConsentResponse);
  rpc SaveConsent(SaveConsentRequest) returns (SaveConsentResponse);
  rpc ExchangeAuthorizationCode(ExchangeAuthorizationCodeRequest) returns (OidcTokenResponse);
  rpc RegisterClient(RegisterClientRequest) returns (RegisterClientResponse);
}

// ── Account recovery & audit (v0.2) ─────────────────────────

message EmailRequest {
  string email = 1;
}

message TokenRequest {
  string token = 1;
}

// dev_token is only populated when APP_ENV != production (so flows can be tested
// without an email server). In production the token is emailed, never returned.
message DevTokenResponse {
  bool success = 1;
  string dev_token = 2;
}

message GenericResponse {
  bool success = 1;
}

message ResetPasswordRequest {
  string token = 1;
  string new_password = 2;
}

message AuditEvent {
  int64 id = 1;
  string actor_id = 2;
  string actor_email = 3;
  string action = 4;
  string target = 5;
  string detail = 6;
  string created_at = 7;
}

message ListAuditEventsRequest {
  int32 limit = 1;
}

message ListAuditEventsResponse {
  repeated AuditEvent events = 1;
}

// ── Identity & tokens ───────────────────────────────────────

message RegisterRequest {
  string email = 1;
  string password = 2;
}

message RegisterResponse {
  string user_id = 1;
  string email = 2;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message RefreshRequest {
  string refresh_token = 1;
}

message TokenPair {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3; // access token TTL in seconds
  string token_type = 4; // "Bearer"
}

message LogoutRequest {
  string refresh_token = 1;
  string access_token = 2; // revoked (denylisted by jti) on logout
}

message LogoutResponse {
  bool success = 1;
}

message DeleteUserRequest {
  string user_id = 1;
}

message DeleteUserResponse {
  bool success = 1;
}

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  string user_id = 1;
  string email = 2;
  repeated string roles = 3;
  repeated string permissions = 4;
}

// ── RBAC ────────────────────────────────────────────────────

message Role {
  int64 id = 1;
  string name = 2;
  string description = 3;
  repeated string permissions = 4;
}

message Permission {
  int64 id = 1;
  string name = 2;
  string description = 3;
}

message CreateRoleRequest {
  string name = 1;
  string description = 2;
}

message UpdateRoleRequest {
  string name = 1;
  string description = 2;
}

message DeleteRoleRequest {
  string name = 1;
}

message DeleteRoleResponse {
  bool success = 1;
}

message ListRolesRequest {}

message ListRolesResponse {
  repeated Role roles = 1;
}

message AssignRoleRequest {
  string user_id = 1;
  string role_name = 2;
}

message AssignRoleResponse {
  bool success = 1;
}

message RevokeRoleRequest {
  string user_id = 1;
  string role_name = 2;
}

message RevokeRoleResponse {
  bool success = 1;
}

message ListPermissionsRequest {}

message ListPermissionsResponse {
  repeated Permission permissions = 1;
}

message GrantPermissionRequest {
  string role_name = 1;
  string permission_name = 2;
}

message GrantPermissionResponse {
  bool success = 1;
}

message RevokePermissionRequest {
  string role_name = 1;
  string permission_name = 2;
}

message RevokePermissionResponse {
  bool success = 1;
}

// ── OIDC (v0.7) ─────────────────────────────────────────────

// Jwk is one public key in JWK form (RFC 7517) for an RSA signing key.
message Jwk {
  string kid = 1; // key id (matches the JWT header `kid`)
  string kty = 2; // key type, e.g. "RSA"
  string use = 3; // public key use, e.g. "sig"
  string alg = 4; // algorithm, e.g. "RS256"
  string n = 5;   // RSA modulus, base64url
  string e = 6;   // RSA exponent, base64url
}

message GetJwksRequest {}

message GetJwksResponse {
  repeated Jwk keys = 1;
}

// A registered OAuth2 client.
message OAuthClient {
  string client_id = 1;
  string name = 2;
  repeated string redirect_uris = 3;
  repeated string scopes = 4;
  repeated string grant_types = 5;
  bool is_confidential = 6;
}

message GetClientRequest {
  string client_id = 1;
}

message CreateAuthorizationCodeRequest {
  string client_id = 1;
  string user_id = 2;
  string redirect_uri = 3;
  string scope = 4;
  string code_challenge = 5;
  string code_challenge_method = 6;
  string nonce = 7;
}

message CreateAuthorizationCodeResponse {
  string code = 1;
}

message GetConsentRequest {
  string user_id = 1;
  string client_id = 2;
}

message GetConsentResponse {
  repeated string scopes = 1; // previously granted scopes (empty if none)
}

message SaveConsentRequest {
  string user_id = 1;
  string client_id = 2;
  repeated string scopes = 3;
}

message SaveConsentResponse {
  bool success = 1;
}

message ExchangeAuthorizationCodeRequest {
  string client_id = 1;
  string client_secret = 2; // empty for public (PKCE) clients
  string code = 3;
  string redirect_uri = 4;
  string code_verifier = 5; // PKCE
}

message OidcTokenResponse {
  string access_token = 1;
  string id_token = 2;
  string refresh_token = 3;
  int64 expires_in = 4;
  string token_type = 5; // "Bearer"
  string scope = 6;
}

message RegisterClientRequest {
  string name = 1;
  repeated string redirect_uris = 2;
  repeated string scopes = 3;
  bool is_confidential = 4;
}

message RegisterClientResponse {
  string client_id = 1;
  string client_secret = 2; // returned once (plaintext) for confidential clients
}
