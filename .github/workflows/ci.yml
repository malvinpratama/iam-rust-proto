name: ci
on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo build --release
